<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teknik Doküman Yönetim Sistemi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div id="dashboardView">
        <header>
            <h1>Teknik Doküman Yönetimi</h1>
            <p>Modern ve güvenli doküman kontrol merkezi</p>
            <button onclick="location.reload()" class="btn btn-secondary" style="margin-top: 1rem;">🔄 Sayfayı Yenile</button>
        </header>

        <main>
            <section class="upload-section glass-panel">
                <h2>Yeni Doküman Yükle</h2>
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="docNo">Döküman No</label>
                        <input type="text" id="docNo" required placeholder="Örn: DOC-001">
                    </div>
                    <div class="form-group">
                        <label for="docName">Doküman Adı</label>
                        <input type="text" id="docName" required placeholder="Örn: Mastar Teknik Çizimi">
                    </div>
                    <div class="form-group">
                        <label for="docType">Tip</label>
                        <select id="docType" required>
                            <option value="Prosedür">Prosedür</option>
                            <option value="Talimat">Talimat</option>
                            <option value="Kılavuz">Kılavuz</option>
                            <option value="Şartname">Şartname</option>
                            <option value="Form">Form</option>
                            <option value="Teknik Resim">Teknik Resim</option>
                            <option value="Operasyon Planı">Operasyon Planı</option>
                            <option value="Standart">Standart</option>
                        </select>
                    </div>
                    <div class="form-group file-upload-group">
                        <label for="docFile" class="file-label">
                            <span class="file-icon">📄</span>
                            <span id="fileName">PDF Seçin veya Sürükleyin</span>
                        </label>
                        <input type="file" id="docFile" accept=".pdf" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Yükle</button>
                </form>
            </section>

            <section class="table-section glass-panel">
                <h2>Doküman Listesi</h2>
                <div class="filter-bar" style="margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;">
                    <span style="font-weight: 600; color: var(--text-primary);">Filtreler:</span>
                    <select id="filterType" style="width: 200px;">
                        <option value="Tümü">Tüm Tipler</option>
                        <option value="Prosedür">Prosedür</option>
                        <option value="Talimat">Talimat</option>
                        <option value="Kılavuz">Kılavuz</option>
                        <option value="Şartname">Şartname</option>
                        <option value="Form">Form</option>
                        <option value="Teknik Resim">Teknik Resim</option>
                        <option value="Operasyon Planı">Operasyon Planı</option>
                        <option value="Standart">Standart</option>
                    </select>
                    <select id="filterStatus" style="width: 200px;">
                        <option value="Tümü">Tüm Durumlar</option>
                        <option value="Beklemede">Beklemede</option>
                        <option value="Onaylandı">Onaylandı</option>
                        <option value="Reddedildi">Reddedildi</option>
                        <option value="Arşivlendi">Arşivlendi</option>
                    </select>
                    <input type="text" id="filterSearch" placeholder="Doküman Adı / No Ara..." style="width: 250px;">
                </div>
                <div class="table-responsive">
                    <table id="docTable">
                        <thead>
                            <tr>
                                <th>Döküman No</th>
                                <th>Doküman Adı</th>
                                <th>Tip</th>
                                <th>Tarih</th>
                                <th>Dosya</th>
                                <th>Durum</th>
                                <th>Geri Bildirim</th>
                                <th>İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="docTableBody">
                            <!-- JS ile doldurulacak -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        </div> <!-- End of dashboardView -->

        <!-- Detail View -->
        <div id="detailView" style="display: none; animation: fadeIn 0.4s ease-out;">
            <header style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; text-align: left;">
                <button onclick="closeDetailView()" class="btn btn-secondary">⬅ Geri Dön</button>
                <h1 style="margin: 0; font-size: 2rem; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Doküman Detayı</h1>
            </header>
            <div class="glass-panel" style="margin-bottom: 1.5rem;">
                <div id="previewDetails" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; font-size: 1rem;"></div>
            </div>
            <div class="glass-panel" style="padding: 1rem;">
                <iframe id="previewIframe" src="" style="width: 100%; height: 70vh; border: none; border-radius: 8px; background: white;"></iframe>
            </div>
        </div>
    </div>

    <!-- Reddetme Modalı -->
    <div id="rejectModal" class="modal">
        <div class="modal-content glass-panel">
            <h3>Dokümanı Reddet</h3>
            <p>Lütfen ret nedenini belirtin (Geri bildirim olarak kaydedilecektir).</p>
            <textarea id="feedbackText" rows="4" placeholder="Ret nedeni..."></textarea>
            <div class="modal-actions">
                <button id="cancelReject" class="btn btn-secondary">İptal</button>
                <button id="confirmReject" class="btn btn-danger">Reddet ve Kaydet</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
